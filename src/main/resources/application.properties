server.port=8080

# Default active profile. Override with -Dspring.profiles.active=dev|stg|prod
# or the SPRING_PROFILES_ACTIVE environment variable. Per-environment datasource
# properties live in application-{local,dev,stg,prod}.properties.
spring.profiles.active=local

spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

spring.sql.init.mode=always
spring.sql.init.platform=postgres
spring.jpa.defer-datasource-initialization=true

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [txId=%X{transactionId}] %-5level %logger{36} - %msg%n

# Actuator: expose health, info, metrics and the Prometheus scrape endpoint.
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.health.diskspace.enabled=true
management.metrics.tags.application=gym-crm
management.prometheus.metrics.export.enabled=true
